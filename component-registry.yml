# Component Registry — Autonomi Developer Documentation
# Maps components within each repo to the documentation pages and skills they feed.
# See CLAUDE.md for how agents use this during writing and auditing.
# See repo-registry.yml for repo-level scope and behaviour.

components:

  # === ant-sdk ===

  antd:
    repo: ant-sdk
    kind: rust-binary
    path: antd/
    topics:
      - daemon
      - rest-api
      - grpc
      - install
    feeds_pages:
      - getting-started/install.md
      - sdk-reference/overview.md
      - sdk-reference/rest-api.md
      - sdk-reference/daemon-cli.md
    feeds_skills:
      - skills/autonomi-developer/SKILL.md

  openapi:
