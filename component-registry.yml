# Component Registry — Autonomi Developer Documentation
# Maps components within each repo to the documentation pages they feed.
# See CLAUDE.md for how agents use this during writing and auditing.
# See repo-registry.yml for repo-level scope and behaviour.

components:

  # === ant-sdk ===

  antd:
    repo: ant-sdk
    kind: rust-binary
    path: antd/
    topics:
      - daemon
      - rest-api
      - grpc
      - install
    feeds_pages:
      - index.md
      - sdk/install.md
      - sdk/start-the-local-daemon.md
      - sdk/retrieve-data-from-the-network.md
      - sdk/store-data-on-the-network.md
      - sdk/how-to-guides/README.md
      - sdk/how-to-guides/store-and-retrieve-data.md
      - sdk/how-to-guides/use-the-daemon-as-a-local-service.md
      - sdk/how-to-guides/use-external-signers-for-upload-payments.md
      - sdk/reference/README.md
      - sdk/reference/overview.md
      - sdk/reference/daemon-command-reference.md
      - reference/source-repositories.md
      - reference/glossary.md

  openapi:
    repo: ant-sdk
    kind: api-spec
    path: antd/openapi.yaml
    topics:
      - rest-api
    feeds_pages:
      - sdk/reference/rest-api.md

  proto:
